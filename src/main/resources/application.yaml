spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cache:
    type: simple
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3000}/${DB_NAME:restaurant}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  # Email Configuration (Optional - set spring.mail.enabled=true to enable)
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    test-connection: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Admin Configuration
admin:
  invite-code: ${ADMIN_INVITE_CODE:ADMIN-SECRET-2026}

# CORS Configuration
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

# Application Configuration
app:
  name: ${APP_NAME:Restaurant Management System}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

# Management/Actuator Configuration
management:
  health:
    mail:
      enabled: false
    db:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics
