name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B verify -Dspring.profiles.active=test
        env:
          JWT_SECRET: test-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm
          DB_PASSWORD: test
